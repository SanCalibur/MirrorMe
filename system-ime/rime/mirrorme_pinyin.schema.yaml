schema:
  schema_id: mirrorme_pinyin
  name: MirrorMe Pinyin
  version: "0.1"

switches:
  - name: ascii_mode
    reset: 0
    states: [中文, 西文]
  - name: full_shape
    states: [半角, 全角]
  - name: simplification
    reset: 1
    states: [漢字, 汉字]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - derive/^([nl])ue$/$1ve/
    - derive/^([jqxy])u$/$1v/
    - derive/^(.*)iu$/$1iou/
    - derive/^(.*)ui$/$1uei/
    - derive/^(.*)un$/$1uen/
    - derive/^([jqxy])v$/$1u/
    - abbrev/^([a-z]).+$/$1/
    - abbrev/^([a-z]).+ ([a-z]).+$/$1$2/

translator:
  dictionary: mirrorme_pinyin
  enable_sentence: true
  enable_user_dict: true
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([jqxy])v/$1u/

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default

simplifier:
  opencc_config: s2t.json
  option_name: simplification
